<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NESTING — Sua Casa, Seu Ninho</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: linear-gradient(135deg, #6b5344 0%, #4a90e2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  background: white;
  border-radius: 20px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
}
.logo {
  font-size: 60px;
  margin-bottom: 20px;
}
h1 {
  color: #2a211a;
  font-size: 32px;
  margin-bottom: 10px;
}
.subtitle {
  color: #6b5e54;
  font-size: 14px;
  margin-bottom: 40px;
}
.button {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.3s;
}
.button-google {
  background: linear-gradient(135deg, #4285f4 0%, #1f5fb8 100%);
  color: white;
}
.button-google:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
}
.button-email {
  background: #f5f1ec;
  color: #2a211a;
}
.button-email:hover {
  background: #ece6df;
}
input {
  width: 100%;
  padding: 12px;
  border: 2px solid #ece6df;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 12px;
  font-family: inherit;
}
input:focus {
  outline: none;
  border-color: #4a90e2;
}
.error {
  color: #e85d75;
  font-size: 12px;
  margin: 10px 0;
}
.success {
  color: #6b8e23;
  font-size: 12px;
  margin: 10px 0;
}
.hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">🏠</div>
  <h1>NESTING</h1>
  <p class="subtitle">Construindo seu ninho, móvel por móvel</p>
  
  <!-- TELA LOGIN -->
  <div id="loginScreen">
    <button class="button button-google" onclick="entrarComGoogle()">
      🔵 Entrar com Google
    </button>
    
    <p style="color: #9b8f86; margin: 20px 0 15px;">OU</p>
    
    <input type="email" id="email" placeholder="Seu e-mail" />
    <input type="password" id="senha" placeholder="Sua senha" />
    <button class="button button-email" onclick="fazerLoginEmail()">
      Entrar com E-mail
    </button>
    
    <div id="errorMsg" class="error hidden"></div>
  </div>
  
  <!-- TELA APP -->
  <div id="appScreen" class="hidden">
    <h2 id="nomeUsuario" style="margin-bottom: 20px;"></h2>
    
    <button class="button button-email" onclick="adicionarComodoDemo()">
      ➕ Adicionar Cômodo
    </button>
    
    <div id="comodosLista" style="margin-top: 20px; text-align: left;"></div>
    
    <button class="button button-email" onclick="fazerLogout()" style="margin-top: 20px;">
      Sair
    </button>
    
    <div id="successMsg" class="success hidden"></div>
  </div>
</div>

<script>
// SUPABASE INIT
const SUPABASE_URL = 'https://jnymxlngszfwoxtlkrrw.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpueW14bG5nc3pmd294dGxrcnJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0Mjk5MDIsImV4cCI6MjA5NTAwNTkwMn0.mzInN6bPwVsVHKNMarHf1Ejg_xV1xSnr3fkVL6FL9VA'

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let usuarioLogado = null
console.log('✅ Supabase inicializado!')

// DETECTAR AUTENTICAÇÃO
supabaseClient.auth.onAuthStateChanged((event, session) => {
  console.log('Auth:', event, session)
  
  if (session) {
    usuarioLogado = session.user.id
    console.log('✅ Logado:', session.user.email)
    
    document.getElementById('loginScreen').classList.add('hidden')
    document.getElementById('appScreen').classList.remove('hidden')
    document.getElementById('nomeUsuario').textContent = '👋 Bem-vindo, ' + (session.user.email || 'Usuário')
    
    carregarComodos(usuarioLogado)
  } else {
    usuarioLogado = null
    document.getElementById('loginScreen').classList.remove('hidden')
    document.getElementById('appScreen').classList.add('hidden')
  }
})

// GOOGLE LOGIN
async function entrarComGoogle() {
  try {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    })
    if (error) alert('❌ ' + error.message)
  } catch (error) {
    alert('❌ ' + error.message)
  }
}

// EMAIL LOGIN
async function fazerLoginEmail() {
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value
  
  if (!email || !senha) {
    mostrarErro('Preencha e-mail e senha!')
    return
  }
  
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: senha
    })
    
    if (error) {
      mostrarErro(error.message)
      return
    }
    
    console.log('✅ Login bem-sucedido!')
  } catch (error) {
    mostrarErro(error.message)
  }
}

// LOGOUT
async function fazerLogout() {
  if (!confirm('Deseja sair?')) return
  
  try {
    await supabaseClient.auth.signOut()
    usuarioLogado = null
    console.log('✅ Logout realizado!')
  } catch (error) {
    alert('❌ ' + error.message)
  }
}

// ADICIONAR CÔMODO DEMO
async function adicionarComodoDemo() {
  if (!usuarioLogado) {
    mostrarErro('Faça login primeiro!')
    return
  }
  
  const comodosDemo = ['Quarto', 'Sala', 'Cozinha', 'Banheiro']
  const comodo = comodosDemo[Math.floor(Math.random() * comodosDemo.length)]
  
  try {
    const { data, error } = await supabaseClient
      .from('comodos')
      .insert([{
        user_id: usuarioLogado,
        nome: comodo,
        orcamento: Math.random() * 5000 + 1000
      }])
    
    if (error) {
      mostrarErro(error.message)
      return
    }
    
    mostrarSucesso('✅ ' + comodo + ' adicionado!')
    await carregarComodos(usuarioLogado)
  } catch (error) {
    mostrarErro(error.message)
  }
}

// CARREGAR CÔMODOS
async function carregarComodos(userId) {
  try {
    const { data: comodos, error } = await supabaseClient
      .from('comodos')
      .select('id, nome, orcamento, created_at')
      .eq('user_id', userId)
    
    if (error) {
      console.error('❌ Erro:', error)
      return
    }
    
    console.log('✅ Cômodos:', comodos)
    
    const lista = document.getElementById('comodosLista')
    
    if (!comodos || comodos.length === 0) {
      lista.innerHTML = '<p style="color: #9b8f86;">Nenhum cômodo ainda. Adicione um!</p>'
      return
    }
    
    lista.innerHTML = '<h3 style="text-align: left; margin-bottom: 10px;">Seus Cômodos:</h3>' + 
      comodos.map(c => `
        <div style="
          background: #fbf8f4;
          padding: 12px;
          border-radius: 10px;
          margin-bottom: 8px;
          text-align: left;
        ">
          <strong>${c.nome}</strong> - R$ ${(c.orcamento || 0).toFixed(2)}
        </div>
      `).join('')
  } catch (error) {
    console.error('❌ Erro:', error)
  }
}

// HELPERS
function mostrarErro(msg) {
  const el = document.getElementById('errorMsg')
  el.textContent = '❌ ' + msg
  el.classList.remove('hidden')
  setTimeout(() => el.classList.add('hidden'), 5000)
}

function mostrarSucesso(msg) {
  const el = document.getElementById('successMsg')
  el.textContent = msg
  el.classList.remove('hidden')
  setTimeout(() => el.classList.add('hidden'), 3000)
}
</script>

</body>
</html>
